name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rubocop -P
      - run: REDIS_HOST=localhost bundle exec rspec --tag ~perf

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      gem_path: ${{ steps.build.outputs.gem_path }}
      gem_name: ${{ steps.build.outputs.gem_name }}
      version: ${{ steps.build.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          GEM_VERSION=$(ruby -r ./lib/sidekiq_unique_jobs/version -e "puts SidekiqUniqueJobs::VERSION")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$GEM_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match gem version ($GEM_VERSION)"
            exit 1
          fi

      - name: Build gem
        id: build
        run: |
          gem build sidekiq-unique-jobs.gemspec --strict
          GEM_PATH=$(ls sidekiq-unique-jobs-*.gem)
          echo "gem_path=$GEM_PATH" >> "$GITHUB_OUTPUT"
          echo "gem_name=$(basename $GEM_PATH)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify gem contents
        run: |
          GEM_PATH=$(ls sidekiq-unique-jobs-*.gem)
          echo "=== Gem contents ==="
          gem specification "$GEM_PATH" | head -20
          echo ""
          echo "=== File count ==="
          gem unpack "$GEM_PATH" --target /tmp/gem-verify
          find /tmp/gem-verify -type f | wc -l
          echo ""
          echo "=== Checking for unwanted files ==="
          if find /tmp/gem-verify -name "*.rake" -o -name ".git*" -o -name "spec" -type d | grep -q .; then
            echo "::error::Unwanted files found in gem"
            find /tmp/gem-verify -name "*.rake" -o -name ".git*" -o -name "spec" -type d
            exit 1
          fi
          echo "No unwanted files found"

      - name: Generate checksums
        run: |
          GEM_PATH=$(ls sidekiq-unique-jobs-*.gem)
          sha256sum "$GEM_PATH" > "${GEM_PATH}.sha256"
          sha512sum "$GEM_PATH" > "${GEM_PATH}.sha512"
          echo "=== SHA256 ==="
          cat "${GEM_PATH}.sha256"
          echo "=== SHA512 ==="
          cat "${GEM_PATH}.sha512"

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem
          path: |
            sidekiq-unique-jobs-*.gem
            sidekiq-unique-jobs-*.gem.sha256
            sidekiq-unique-jobs-*.gem.sha512
          if-no-files-found: error

  publish-rubygems:
    needs: build
    runs-on: ubuntu-latest
    environment: rubygems

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gem

      - name: Verify checksums
        run: |
          sha256sum -c sidekiq-unique-jobs-*.gem.sha256
          sha512sum -c sidekiq-unique-jobs-*.gem.sha512

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Push to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          gem push sidekiq-unique-jobs-*.gem

  github-release:
    needs: [build, publish-rubygems]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: gem

      - name: Determine pre-release
        id: prerelease
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if echo "$VERSION" | grep -qE "(alpha|beta|rc|pre)"; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GEM_NAME="${{ needs.build.outputs.gem_name }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.prerelease.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ github.ref_name }}" \
            "$GEM_NAME" \
            "${GEM_NAME}.sha256" \
            "${GEM_NAME}.sha512" \
            --generate-notes \
            $PRERELEASE_FLAG \
            --verify-tag
